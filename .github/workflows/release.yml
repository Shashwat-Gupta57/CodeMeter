name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            target: codemeter-linux-amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            target: codemeter-linux-arm64
          - os: macos-14
            arch: arm64
            target: codemeter-macos-arm64
          - os: windows-latest
            arch: amd64
            target: codemeter-windows-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Rename Binary (Unix)
        if: runner.os != 'Windows'
        run: mv build/native/nativeCompile/codemeter build/native/nativeCompile/${{ matrix.target }}

      - name: Package Windows Release
        if: runner.os == 'Windows'
        run: |
          cd build\native\nativeCompile
          copy C:\Windows\System32\vcruntime140.dll .
          7z a codemeter-windows-amd64.zip codemeter.exe vcruntime140.dll
        shell: cmd

      - name: Upload Native Binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: build/native/nativeCompile/${{ matrix.target }}

      - name: Upload Native Binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}.zip
          path: build/native/nativeCompile/${{ matrix.target }}.zip

  build-jar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Shadow JAR
        run: ./gradlew shadowJar

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: codemeter-sbom.json

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: codemeter-jar
          path: build/libs/codemeter.jar

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: codemeter-sbom.json

  release:
    needs: [build-native, build-jar]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          cp artifacts/codemeter.jar release-assets/ || true
          cp artifacts/codemeter-linux-amd64 release-assets/ || true
          cp artifacts/codemeter-linux-arm64 release-assets/ || true
          cp artifacts/codemeter-macos-amd64 release-assets/ || true
          cp artifacts/codemeter-macos-arm64 release-assets/ || true
          cp artifacts/codemeter-windows-amd64.zip release-assets/ || true
          cp artifacts/codemeter-sbom.json release-assets/ || true

          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  publish-winget:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: ShashwatGupta.CodeMeter
          installers-regex: '\.exe$'
          token: ${{ secrets.PAT_TOKEN }}

  publish-scoop:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: native-codemeter-windows-amd64.zip
          path: artifacts

      - name: Calculate Hash and Version
        run: |
          echo "WIN_HASH=$(sha256sum artifacts/codemeter-windows-amd64.zip | awk '{print $1}')" >> $GITHUB_ENV
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Checkout Scoop Bucket
        uses: actions/checkout@v4
        with:
          repository: Shashwat-Gupta57/scoop-bucket
          token: ${{ secrets.PAT_TOKEN }}
          path: scoop-bucket

      - name: Update Manifest
        run: |
          mkdir -p scoop-bucket/bucket
          jq -n \
            --arg version "${{ env.VERSION }}" \
            --arg hash "${{ env.WIN_HASH }}" \
            '{
              version: $version,
              description: "Measure your code. Physically.",
              homepage: "https://github.com/Shashwat-Gupta57/CodeMeter",
              license: "MIT",
              architecture: {
                "64bit": {
                  url: ("https://github.com/Shashwat-Gupta57/CodeMeter/releases/download/v" + $version + "/codemeter-windows-amd64.zip"),
                  hash: $hash
                }
              },
              bin: "codemeter.exe",
              checkver: {
                github: "https://github.com/Shashwat-Gupta57/CodeMeter"
              },
              autoupdate: {
                architecture: {
                  "64bit": {
                    url: "https://github.com/Shashwat-Gupta57/CodeMeter/releases/download/v$version/codemeter-windows-amd64.zip"
                  }
                }
              }
            }' > scoop-bucket/bucket/codemeter.json

      - name: Validate Manifest
        run: |
          cd scoop-bucket
          jq . bucket/codemeter.json > /dev/null

      - name: Push to Bucket
        run: |
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update CodeMeter to v${{ env.VERSION }}" && git push)

  publish-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS ARM Binary
        uses: actions/download-artifact@v4
        with:
          name: native-codemeter-macos-arm64
          path: artifacts

      - name: Download Linux x64 Binary
        uses: actions/download-artifact@v4
        with:
          name: native-codemeter-linux-amd64
          path: artifacts

      - name: Download Linux ARM Binary
        uses: actions/download-artifact@v4
        with:
          name: native-codemeter-linux-arm64
          path: artifacts

      - name: Calculate Hashes
        run: |
          echo "MAC_ARM=$(sha256sum artifacts/codemeter-macos-arm64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "LINUX_INTEL=$(sha256sum artifacts/codemeter-linux-amd64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "LINUX_ARM=$(sha256sum artifacts/codemeter-linux-arm64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: Shashwat-Gupta57/homebrew-tap
          token: ${{ secrets.PAT_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        run: |
          mkdir -p homebrew-tap/Formula
          python3 -c "
          import os
          v = os.environ['VERSION']
          ma = os.environ['MAC_ARM']
          li = os.environ['LINUX_INTEL']
          la = os.environ['LINUX_ARM']
          formula = '''class Codemeter < Formula
            desc \"Measure your code. Physically.\"
            homepage \"https://github.com/Shashwat-Gupta57/CodeMeter\"
            license \"MIT\"
            version \"{v}\"

            on_macos do
              url \"https://github.com/Shashwat-Gupta57/CodeMeter/releases/download/v{v}/codemeter-macos-arm64\"
              sha256 \"{ma}\"
            end

            on_linux do
              if Hardware::CPU.intel?
                url \"https://github.com/Shashwat-Gupta57/CodeMeter/releases/download/v{v}/codemeter-linux-amd64\"
                sha256 \"{li}\"
              else
                url \"https://github.com/Shashwat-Gupta57/CodeMeter/releases/download/v{v}/codemeter-linux-arm64\"
                sha256 \"{la}\"
              end
            end

            def install
              if OS.mac?
                bin.install \"codemeter-macos-arm64\" => \"codemeter\"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install \"codemeter-linux-amd64\" => \"codemeter\"
              elsif OS.linux? && Hardware::CPU.arm?
                bin.install \"codemeter-linux-arm64\" => \"codemeter\"
              end
            end

            test do
              system \"#{{bin}}/codemeter\", \"--version\"
            end
          end
          '''.format(v=v, ma=ma, li=li, la=la, bin='{bin}')
          with open('homebrew-tap/Formula/codemeter.rb', 'w') as f:
              f.write(formula)
          "

      - name: Audit Formula
        run: |
          cd homebrew-tap
          brew audit --strict --online Formula/codemeter.rb || echo "Warning: brew audit failed, but we will proceed (since the tap might be empty initially and cause warnings)."

      - name: Push to Tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update CodeMeter to v${{ env.VERSION }}" && git push)

  verify-distribution:
    needs: [publish-winget, publish-scoop, publish-homebrew]
    runs-on: ubuntu-latest
    steps:
      - name: Verify Scoop Distribution
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          MANIFEST=$(curl -sL https://raw.githubusercontent.com/Shashwat-Gupta57/scoop-bucket/main/bucket/codemeter.json)
          echo "$MANIFEST" | jq -e ".version == \"$VERSION\"" || (echo "Scoop version mismatch" && exit 1)
          echo "$MANIFEST" | jq -e ".architecture.\"64bit\".url | contains(\"$VERSION\")" || (echo "Scoop URL mismatch" && exit 1)
          echo "Scoop manifest successfully verified!"

      - name: Verify Homebrew Distribution
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          FORMULA=$(curl -sL https://raw.githubusercontent.com/Shashwat-Gupta57/homebrew-tap/main/Formula/codemeter.rb)
          echo "$FORMULA" | grep -q "version \"$VERSION\"" || (echo "Homebrew version mismatch" && exit 1)
          echo "$FORMULA" | grep -q "codemeter-macos-amd64" || (echo "Homebrew URL mismatch" && exit 1)
          echo "Homebrew formula successfully verified!"
